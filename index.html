<head>
	<title>Feliz cumpleaños</title>
	<meta charset="UTF-8" />
	<meta name="description" content="Happy Birthday">
	<meta name="robots" content="index, follow" />
	<meta name="keywords" content="Birthday, Happy">
	<meta property="og:type" content="E-Greeting" />
	<meta property="og:image" content="favicon.ico" />
	<meta property="og:description" content="Wish you a very Happy Birthday">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, minimum-scale=1.0, maximum-scale=1.0">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<meta http-equiv="X-UA-Compatible" content="IE=9; IE=8; IE=7; IE=EDGE" />
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/css/bootstrap.min.css">
	<link rel="stylesheet" type="text/css" href="stylesheet.css">
	<link rel="stylesheet" type="text/css" href="loading.css">
	<link href='http://fonts.googleapis.com/css?family=Signika' rel='stylesheet' type='text/css'>
	<link rel="stylesheet/less" href="cake.less">
	<script src="//cdnjs.cloudflare.com/ajax/libs/less.js/2.1.0/less.min.js"></script>

	<style>
		cursor: url('https://cur.cursors-4u.net/holidays/hol-9/hol852.cur'), auto;

		@keyframes fall {
			0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
			100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
		}
		.balloons {
			z-index: 10 !important;
		}
		.message {
			z-index: 200 !important;
		}
	</style>
</head>

<body>
	<div class="loading"></div>
	<audio class="song" controls loop>
		<source src="hbd.mp3"></source>
		Your browser isn't invited for super fun audio time.
	</audio>

	<div class="balloons text-center" id="b1">
		<h2 style="color:#FF0000;">A</h2>
	</div>
	<div class="balloons text-center" id="b2">
		<h2 style="color:#FF69B4;">G</h2>
	</div>
	<div class="balloons text-center" id="b3">
		<h2 style="color:#FF0000;">U</h2>
	</div>
	<div class="balloons text-center" id="b4">
		<h2 style="color:#FF69B4;">S</h2>
	</div>
	<div class="balloons text-center" id="b5">
		<h2 style="color:#FF0000;">T</h2>
	</div>
	<div class="balloons text-center" id="b6">
		<h2 style="color:#FF69B4;">I</h2>
	</div>
	<div class="balloons text-center" id="b7">
		<h2 style="color:#FF0000;">N</h2>
	</div>
	<div class="balloons text-center" id="b8">
		<h2 style="color:#FF69B4;">A</h2>
	</div>

	<img src="Balloon-Border.png" width="100%" class="balloon-border">

	<div class="container">

		<div class="row">
			<div class="col-md-2 col-xs-2 bulb-holder">
				<div class="bulb" id="bulb_yellow"></div>
			</div>
			<div class="col-md-2 col-xs-2 bulb-holder">
				<div class="bulb" id="bulb_red"></div>
			</div>
			<div class="col-md-2 col-xs-2 bulb-holder">
				<div class="bulb" id="bulb_blue"></div>
			</div>
			<div class="col-md-2 col-xs-2 bulb-holder">
				<div class="bulb" id="bulb_green"></div>
			</div>
			<div class="col-md-2 col-xs-2 bulb-holder">
				<div class="bulb" id="bulb_pink"></div>
			</div>
			<div class="col-md-2 col-xs-2 bulb-holder">
				<div class="bulb" id="bulb_orange"></div>
			</div>
		</div>

		<div class="row">
			<div class="col-md-12 text-center">
				<img src="banner.png" class="bannar" style="max-width:600px; width:100%;">
			</div>
		</div>

		<div class="row cake-cover">
			<div class="col-md-12 texr-center">
				<div class="cake">
					<div class="velas">
						<div class="fuego"></div>
						<div class="fuego"></div>
						<div class="fuego"></div>
						<div class="fuego"></div>
						<div class="fuego"></div>
					</div>
					<div class="cobertura"></div>
					<div class="bizcocho"></div>
				</div>
			</div>
		</div>

		<div class="row message">
			<div class="col-md-12">
				<p>Hola Agus</p>
				<p>Espero que pases</p>
				<p>Un hermoso cumpleaños</p>
				<p>Y quiero compartir</p>
				<p>Todos los que queden con vos</p>
				<p>25 añitos</p>
				<p>de ovejita</p>
				<p>Te amo mucho!</p>
				<p>Feliz cumpleaños</p>
			</div>
		</div>

		<img src="https://upload.wikimedia.org/wikipedia/en/0/05/Hello_kitty_character_portrait.png"
			 id="kitty-img"
			 style="width:150px; position:fixed; bottom:80px; right:20px; display:none; z-index:5;">

		<div class="navbar navbar-fixed-bottom">
			<div class="row">
				<div class="col-md-6 text-center col-md-offset-3">
					<button class="btn btn-primary" id="turn_on">Encendemos las luces</button>
					<button class="btn btn-primary" id="play">Musiquita</button>
					<button class="btn btn-primary" id="bannar_coming">Decoramos</button>
					<button class="btn btn-primary" id="balloons_flying">Inflamos los globos</button>
					<button class="btn btn-primary" id="cake_fadein">Una torta</button>
					<button class="btn btn-primary" id="light_candle">Velita</button>
					<button class="btn btn-primary" id="wish_message">Feliz cumpleaños!</button>
					<button class="btn btn-primary" id="story">Un mensaje para vos</button>
				</div>
			</div>
		</div>

	</div>

	<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/js/bootstrap.min.js"></script>
	<script src="effect.js"></script>

	<script>
		document.getElementById('wish_message').addEventListener('click', function() {
			for (let i = 0; i < 60; i++) {
				let bow = document.createElement('div');
				bow.innerHTML = '🎀';
				bow.style.cssText = `
					position: fixed;
					top: -20px;
					left: ${Math.random() * 100}vw;
					font-size: ${16 + Math.random() * 20}px;
					animation: fall ${2 + Math.random() * 3}s linear forwards;
					z-index: 9999;
					pointer-events: none;
				`;
				document.body.appendChild(bow);
				setTimeout(() => bow.remove(), 5000);
			}
		});
	</script>
</body>
</html>
